name: 🔖 Auto Version Bump

# ─── Trigger ────────────────────────────────────────────────────────────────
# Runs on every push to main.
# Reads the last commit message (conventional commits format) to determine
# whether to bump major / minor / patch, then:
#   1. Updates manifest.json version
#   2. Commits the change
#   3. Creates and pushes the git tag → triggers the release workflow
#
# Conventional Commit keywords:
#   feat:     → patch bump  (e.g. 1.0.0 → 1.0.1)
#   feat!:    → minor bump  (e.g. 1.0.1 → 1.1.0)
#   BREAKING CHANGE → minor bump
#   release:  → minor bump  (explicit)
#   major:    → major bump  (e.g. 1.1.0 → 2.0.0)  [manual only]
#
# To SKIP version bump on a commit, add [skip-release] or [no-release] to
# the commit message.
on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

permissions:
  contents: write

jobs:
  bump:
    name: Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Check if version bump should be skipped
        id: skip_check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s %b")
          echo "Last commit: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qE "\[(skip-release|no-release|skip ci)\]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping version bump (skip marker found)"
          elif echo "$COMMIT_MSG" | grep -qE "^(chore|ci|docs|style)\(release\)"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping version bump (release commit)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 📖 Read current version from manifest
        id: current_version
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          CURRENT=$(python3 -c "import json; d=json.load(open('custom_components/automation_map/manifest.json')); print(d['version'])")
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          echo "📦 Current version: ${CURRENT}"

      - name: 🧮 Determine bump type
        id: bump_type
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          # Gather all commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s %b" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s %b" ${LAST_TAG}..HEAD)
          fi
          echo "Commits since last tag:"
          echo "$COMMITS"
          echo ""

          # Determine bump type from conventional commits
          if echo "$COMMITS" | grep -qiE "(^major:|BREAKING CHANGE|^feat!|^fix!|^refactor!)"; then
            BUMP="minor"
            echo "📈 Bump type: minor (breaking or major keyword detected)"
          elif echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.*\))?!:"; then
            BUMP="minor"
            echo "📈 Bump type: minor (feat! detected)"
          elif echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.*\))?: "; then
            BUMP="patch"
            echo "📈 Bump type: patch (feat detected)"
          elif echo "$COMMITS" | grep -qiE "^(fix|bugfix|hotfix)(\(.*\))?: "; then
            BUMP="patch"
            echo "📈 Bump type: patch (fix detected)"
          elif echo "$COMMITS" | grep -qiE "^(perf|refactor)(\(.*\))?: "; then
            BUMP="patch"
            echo "📈 Bump type: patch (perf/refactor detected)"
          else
            BUMP="patch"
            echo "📈 Bump type: patch (default)"
          fi

          echo "bump=${BUMP}" >> $GITHUB_OUTPUT

      - name: ➕ Calculate new version
        id: new_version
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          CURRENT="${{ steps.current_version.outputs.current }}"
          BUMP="${{ steps.bump_type.outputs.bump }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "🆕 New version: ${NEW_VERSION} (${BUMP} bump from ${CURRENT})"

      - name: ✏️ Update manifest.json
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new }}"
          python3 - <<EOF
          import json

          with open('custom_components/automation_map/manifest.json', 'r') as f:
              data = json.load(f)

          old_version = data['version']
          data['version'] = '${NEW_VERSION}'

          with open('custom_components/automation_map/manifest.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')

          print(f"Updated manifest.json: {old_version} → ${NEW_VERSION}")
          EOF

      - name: 📤 Commit & Tag
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VERSION="${{ steps.new_version.outputs.new }}"
          TAG="${{ steps.new_version.outputs.tag }}"

          git add custom_components/automation_map/manifest.json
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip-release]"
          git tag -a "${TAG}" -m "Release ${TAG}"

          git push origin main
          git push origin "${TAG}"

          echo "✅ Committed and tagged ${TAG}"

      - name: 📋 Generate Changelog
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new }}"
          TAG="${{ steps.new_version.outputs.tag }}"
          
          # Get the previous tag for changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          echo "Generating changelog for range: $RANGE"

          # Build changelog from conventional commits
          {
            echo "## 📝 Was ist neu in ${TAG}?"
            echo ""

            # Features
            FEATURES=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -E "^feat(\(.*\))?: " | sed 's/^feat[^:]*: //' || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Neue Features"
              echo "$FEATURES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Fixes
            FIXES=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -E "^fix(\(.*\))?: " | sed 's/^fix[^:]*: //' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bugfixes"
              echo "$FIXES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Improvements
            IMPR=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -E "^(chore|refactor|perf|style|docs)(\(.*\))?: " | sed 's/^[a-z]*[^:]*: //' || true)
            if [ -n "$IMPR" ]; then
              echo "### 🔧 Verbesserungen"
              echo "$IMPR" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Other commits (not matching conventional format)
            OTHERS=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -vE "^(feat|fix|chore|refactor|perf|style|docs)(\(.*\))?: " | grep -v "^Merge " || true)
            if [ -n "$OTHERS" ]; then
              echo "### 📦 Weitere Änderungen"
              echo "$OTHERS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            echo ""
            echo "---"
            if [ -n "$PREV_TAG" ]; then
              echo "**Full diff**: [$PREV_TAG...${TAG}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG})"
            fi

          } > CHANGELOG_BODY.md

          cat CHANGELOG_BODY.md

      - name: 📦 Package Integration
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.new_version.outputs.new }}"
          ARCHIVE="automation_map_v${VERSION}.zip"

          # Create ZIP of the custom_components folder
          cd custom_components
          zip -r "../${ARCHIVE}" automation_map/
          cd ..

          echo "✅ Created ${ARCHIVE} ($(du -sh ${ARCHIVE} | cut -f1))"

      - name: 🚀 Create GitHub Release
        if: steps.skip_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.new_version.outputs.tag }}
          name: "🗺️ Automation Map ${{ steps.new_version.outputs.tag }}"
          body_path: CHANGELOG_BODY.md
          files: |
            automation_map_v${{ steps.new_version.outputs.new }}.zip
          draft: false
          prerelease: ${{ contains(steps.new_version.outputs.tag, '-') }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: 🚀 Release

# ─── Trigger ────────────────────────────────────────────────────────────────
# Runs when a version tag (v*.*.*) is pushed.
# Tags are created automatically by the "Auto Version Bump" workflow,
# or manually via: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ─── Build Release ──────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: 🏷️ Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"           # e.g. v1.2.3
          VERSION_NUM="${VERSION#v}"             # e.g. 1.2.3
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION_NUM}" >> $GITHUB_OUTPUT
          echo "📦 Building release for ${VERSION}"

      - name: ✅ Validate manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; d=json.load(open('custom_components/automation_map/manifest.json')); print(d['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "Manifest version : $MANIFEST_VERSION"
          echo "Tag version      : $TAG_VERSION"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: manifest=$MANIFEST_VERSION tag=$TAG_VERSION"
            echo "   The manifest.json should be updated before tagging."
            exit 1
          fi
          echo "✅ Versions match"

      - name: 📋 Generate Changelog
        id: changelog
        run: |
          # Get the previous tag for changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -1)
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${{ steps.version.outputs.tag }}"
          fi

          echo "Generating changelog for range: $RANGE"

          # Build changelog from conventional commits
          {
            echo "## 📝 Was ist neu in ${{ steps.version.outputs.tag }}?"
            echo ""

            # Features
            FEATURES=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -E "^feat(\(.*\))?: " | sed 's/^feat[^:]*: //')
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Neue Features"
              echo "$FEATURES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Fixes
            FIXES=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -E "^fix(\(.*\))?: " | sed 's/^fix[^:]*: //')
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bugfixes"
              echo "$FIXES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Improvements
            IMPR=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -E "^(chore|refactor|perf|style|docs)(\(.*\))?: " | sed 's/^[a-z]*[^:]*: //')
            if [ -n "$IMPR" ]; then
              echo "### 🔧 Verbesserungen"
              echo "$IMPR" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Other commits (not matching conventional format)
            OTHERS=$(git log $RANGE --pretty=format:"%s" 2>/dev/null | grep -vE "^(feat|fix|chore|refactor|perf|style|docs)(\(.*\))?: " | grep -v "^Merge ")
            if [ -n "$OTHERS" ]; then
              echo "### 📦 Weitere Änderungen"
              echo "$OTHERS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            echo ""
            echo "---"
            echo "**Full diff**: [$PREV_TAG...${{ steps.version.outputs.tag }}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }})"

          } > CHANGELOG_BODY.md

          cat CHANGELOG_BODY.md
          echo "changelog_file=CHANGELOG_BODY.md" >> $GITHUB_OUTPUT

      - name: 📦 Package Integration
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="automation_map_v${VERSION}.zip"

          # Create ZIP of the custom_components folder (what users install manually)
          cd custom_components
          zip -r "../${ARCHIVE}" automation_map/
          cd ..

          echo "archive=${ARCHIVE}" >> $GITHUB_ENV
          echo "✅ Created ${ARCHIVE} ($(du -sh ${ARCHIVE} | cut -f1))"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🗺️ Automation Map ${{ steps.version.outputs.tag }}"
          body_path: CHANGELOG_BODY.md
          files: |
            automation_map_v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏠 HACS Validation reminder
        run: |
          echo ""
          echo "✅ Release ${{ steps.version.outputs.tag }} successfully created!"
          echo ""
          echo "📋 Next steps for HACS submission:"
          echo "   1. Go to https://github.com/MovingLlama/automation-map"
          echo "   2. Verify the release ZIP contains the correct files"
          echo "   3. Submit to HACS: https://hacs.xyz/docs/publish/integration"
